<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rigid Logic ERP - Giriş</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            overflow: hidden;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .bg-glow {
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.15;
            pointer-events: none;
        }

        .bg-glow-1 { background: #3b82f6; top: -150px; right: -100px; }
        .bg-glow-2 { background: #8b5cf6; bottom: -150px; left: -100px; }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }

        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 24px;
            font-weight: 700;
            color: white;
        }

        .login-header h1 {
            color: #f1f5f9;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .login-header p {
            color: #94a3b8;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #cbd5e1;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: #64748b;
        }

        .form-group input {
            width: 100%;
            padding: 12px 14px 12px 44px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #f1f5f9;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .form-group input::placeholder {
            color: #475569;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.35);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            text-align: center;
        }

        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer-text {
            text-align: center;
            margin-top: 24px;
            color: #475569;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="bg-grid"></div>
    <div class="bg-glow bg-glow-1"></div>
    <div class="bg-glow bg-glow-2"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">RL</div>
                <h1>Rigid Logic ERP</h1>
                <p>Hesabınıza giriş yapın</p>
            </div>

            <div id="error-message" class="error-message"></div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Kullanıcı Adı</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                        </svg>
                        <input type="text" id="username" placeholder="Kullanıcı adınızı girin" required autocomplete="username">
                    </div>
                </div>
                <div class="form-group">
                    <label for="password">Şifre</label>
                    <div class="input-wrapper">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
                        </svg>
                        <input type="password" id="password" placeholder="Şifrenizi girin" required autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="login-btn" id="login-btn">Giriş Yap</button>
            </form>

            <div class="footer-text">&copy; 2026 Rigid Logic. Tüm hakları saklıdır.</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script>
        let isSettingUpAdmin = false;

        auth.onAuthStateChanged(user => {
            if (user && !isSettingUpAdmin) window.location.href = 'dashboard.html';
        });

        async function ensureAdminExists() {
            isSettingUpAdmin = true;
            const adminEmail = usernameToEmail(ADMIN_USERNAME);
            try {
                let secondaryApp;
                try { secondaryApp = firebase.app('AdminSetup'); }
                catch (e) { secondaryApp = firebase.initializeApp(firebaseConfig, 'AdminSetup'); }
                const setupAuth = secondaryApp.auth();

                try {
                    await setupAuth.signInWithEmailAndPassword(adminEmail, ADMIN_PASSWORD);
                    await setupAuth.signOut();
                } catch (e) {
                    if (e.code === 'auth/user-not-found' || e.code === 'auth/invalid-credential') {
                        const cred = await setupAuth.createUserWithEmailAndPassword(adminEmail, ADMIN_PASSWORD);
                        await db.collection('users').doc(cred.user.uid).set({
                            username: ADMIN_USERNAME,
                            displayName: 'Admin',
                            role: 'admin',
                            email: adminEmail,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        await setupAuth.signOut();
                    }
                }
            } catch (err) {
                console.error('Admin kurulumu:', err);
            } finally {
                isSettingUpAdmin = false;
            }
        }

        ensureAdminExists();

        function showError(msg) {
            const el = document.getElementById('error-message');
            el.textContent = msg;
            el.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error-message').style.display = 'none';
        }

        async function handleLogin(e) {
            e.preventDefault();
            hideError();

            const btn = document.getElementById('login-btn');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            if (!username || !password) {
                showError('Lütfen tüm alanları doldurun.');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="loading-spinner"></span>Giriş yapılıyor...';

            try {
                const email = usernameToEmail(username);
                await auth.signInWithEmailAndPassword(email, password);
                window.location.href = 'dashboard.html';
            } catch (err) {
                console.error(err);
                if (err.code === 'auth/user-not-found' || err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password') {
                    showError('Kullanıcı adı veya şifre hatalı.');
                } else if (err.code === 'auth/too-many-requests') {
                    showError('Çok fazla deneme. Lütfen biraz bekleyin.');
                } else {
                    showError('Giriş yapılamadı. Lütfen tekrar deneyin.');
                }
            } finally {
                btn.disabled = false;
                btn.textContent = 'Giriş Yap';
            }
        }
    </script>
</body>
</html>
